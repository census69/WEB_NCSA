<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="../view/style.css">
</head>

<body>

  <div class="login-box">
    <h2>เข้าสู่ระบบ / สมัครสมาชิก</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <div style="display: flex; gap: 10px; margin-top: 15px;">
      <button onclick="login()" style="flex: 1;">Login</button>
      <button onclick="register()" style="flex: 1; background: #3498db;">Sign Up</button>
    </div>
  </div>

  <script src="../control/login.js"></script>
</body>

</html>
